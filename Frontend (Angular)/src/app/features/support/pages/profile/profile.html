<div class="page">

    <h1>

        My Profile

    </h1>

    <div class="card">

        <div class="row">

            <label>Name</label>

            <span>{{ agent.name }}</span>

        </div>

        <div class="row">

            <label>Email</label>

            <span>{{ agent.email }}</span>

        </div>

        <div class="row">

            <label>Phone</label>

            <span>{{ agent.phone }}</span>

        </div>

        <div class="row">

            <label>Department</label>

            <span>{{ agent.department }}</span>

        </div>

        <div class="row">

            <label>Role</label>

            <span>{{ agent.role }}</span>

        </div>

    </div>

</div>
